# Qwen3-Omni-MoE deploy with CudaIPCConnector for ALL stage edges.
#
# Uses CudaIPCConnector for both cross-GPU (stage0→1, D2D via NVLink/PCIe)
# and same-GPU (stage1→2, local D2D copy) transfers. This avoids the
# dual-connector format mismatch where the mixin can only hold one connector.
#
# Usage:
#   CUDA_VISIBLE_DEVICES=0,1 vllm serve <model-path> --omni \
#       --deploy-config vllm_omni/deploy/qwen3_omni_moe_cuda_ipc.yaml
#
async_chunk: true

connectors:
  connector_of_cuda_ipc:
    name: CudaIPCConnector
    extra:
      tensor_lifetime_sec: 30.0
      max_held_bytes: 2147483648
      codec_chunk_frames: 25
      codec_left_context_frames: 25

stages:
  - stage_id: 0
    max_num_batched_tokens: 32768
    max_num_seqs: 64
    gpu_memory_utilization: 0.9
    trust_remote_code: true
    enable_prefix_caching: false
    devices: "0"
    default_sampling_params:
      temperature: 0.4
      top_p: 0.9
      top_k: 1
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 1
    max_num_batched_tokens: 32768
    max_num_seqs: 64
    gpu_memory_utilization: 0.6
    trust_remote_code: true
    enable_prefix_caching: false
    devices: "1"
    input_connectors:
      from_stage_0: connector_of_cuda_ipc
    default_sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 4096
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 2
    max_num_batched_tokens: 65536
    max_num_seqs: 64
    gpu_memory_utilization: 0.1
    enforce_eager: false
    trust_remote_code: true
    enable_prefix_caching: false
    enable_chunked_prefill: false
    async_scheduling: false
    devices: "1"
    input_connectors:
      from_stage_1: connector_of_cuda_ipc
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 65536
      seed: 42
      repetition_penalty: 1.1
